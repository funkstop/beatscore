  <li><strong>Gettysburg</strong><br><audio controls src="https://funkstop.github.io/beatscore/gettysburg_song.mp3"></audio></li>
  <li><strong>Churchill (Beaches)</strong><br><audio controls src="https://funkstop.github.io/beatscore/churchill_beaches_song.mp3"></audio></li>
</ul>

<script>
  const players = document.querySelectorAll("audio");

  players.forEach(player => {
    player.addEventListener("play", () => {
      players.forEach(other => {
        if (other !== player) {
          other.pause();
        }
      });
    });
  });
</script>
